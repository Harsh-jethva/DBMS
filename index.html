<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Page</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #020617;
        margin: 0;
        padding: 30px;
        min-height: 100vh;
        position: relative;
        overflow: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        inset: -20%;
        background:
          radial-gradient(circle at 20% 20%, rgba(34, 211, 238, 0.2), transparent 35%),
          radial-gradient(circle at 80% 25%, rgba(168, 85, 247, 0.22), transparent 35%),
          radial-gradient(circle at 50% 85%, rgba(14, 165, 233, 0.2), transparent 40%),
          linear-gradient(135deg, #020617, #0f172a 45%, #111827);
        animation: darkBgShift 18s ease-in-out infinite alternate;
        z-index: 0;
        pointer-events: none;
      }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background:
          repeating-linear-gradient(
            120deg,
            rgba(56, 189, 248, 0.08) 0px,
            rgba(56, 189, 248, 0.08) 2px,
            transparent 2px,
            transparent 90px
          );
        animation: stripeMove 16s linear infinite;
        z-index: 0;
        pointer-events: none;
      }
      .container {
        max-width: 550px;
        margin: 30px auto;
        background: rgba(15, 23, 42, 0.72);
        backdrop-filter: blur(10px);
        border-radius: 14px;
        padding: 24px;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(148, 163, 184, 0.35);
        animation: cardIn 0.8s ease;
        position: relative;
        z-index: 1;
      }
      .theme-note {
        color: #93c5fd;
        font-size: 12px;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      h2 {
        margin-top: 0;
        color: #f8fafc;
      }
      label {
        display: block;
        margin-top: 12px;
        font-weight: 600;
        color: #cbd5e1;
      }
      input,
      select,
      textarea,
      button {
        width: 100%;
        margin-top: 6px;
        padding: 10px;
        border: 1px solid #334155;
        background: rgba(15, 23, 42, 0.9);
        color: #e2e8f0;
        border-radius: 6px;
        box-sizing: border-box;
        transition: box-shadow 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
      }
      input::placeholder,
      textarea::placeholder {
        color: #94a3b8;
      }
      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: #22d3ee;
        box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.2);
        transform: translateY(-1px);
      }
      button {
        margin-top: 16px;
        background: linear-gradient(90deg, #06b6d4, #7c3aed);
        color: #fff;
        border: none;
        cursor: pointer;
        font-weight: 700;
      }
      button:hover {
        background: linear-gradient(90deg, #0891b2, #6d28d9);
      }
      .message {
        margin-top: 12px;
        font-size: 14px;
        font-weight: 600;
      }
      .top-link {
        display: inline-block;
        margin-bottom: 12px;
        text-decoration: none;
        color: #67e8f9;
        font-weight: 600;
        transition: color 0.2s ease;
      }
      .top-link:hover {
        color: #e879f9;
      }
      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes darkBgShift {
        0% {
          transform: translate3d(-2%, -1%, 0) scale(1);
        }
        100% {
          transform: translate3d(2%, 1%, 0) scale(1.04);
        }
      }
      @keyframes stripeMove {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-120px);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      
      <a class="top-link" href="/admin.html">Go to Admin Page</a>
      <h2>Registration Form</h2>
      <form id="registrationForm">
        <label for="firstName">First Name</label>
        <input id="firstName" name="firstName" required />

        <label for="lastName">Last Name</label>
        <input id="lastName" name="lastName" required />

        <label for="mobileNumber">Mobile Number</label>
        <input id="mobileNumber" name="mobileNumber" required />

        <label for="address">Address</label>
        <textarea id="address" name="address" rows="2" required></textarea>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />

        <label for="gender">Gender</label>
        <select id="gender" name="gender" required>
          <option value="">Select Gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>

        <label for="nationality">Nationality</label>
        <input id="nationality" name="nationality" required />

        <button type="submit">Submit</button>
      </form>
      <div class="message" id="message"></div>
    </div>

    <script>
      const form = document.getElementById("registrationForm");
      const message = document.getElementById("message");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const payload = {
          firstName: form.firstName.value.trim(),
          lastName: form.lastName.value.trim(),
          mobileNumber: form.mobileNumber.value.trim(),
          address: form.address.value.trim(),
          email: form.email.value.trim(),
          gender: form.gender.value,
          nationality: form.nationality.value.trim(),
        };

        try {
          const response = await fetch("/api/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await response.json();

          if (!response.ok) {
            message.style.color = "red";
            message.textContent = data.message || "Failed to save.";
            return;
          }

          message.style.color = "green";
          message.textContent = "Data saved successfully.";
          form.reset();
        } catch (_error) {
          message.style.color = "red";
          message.textContent = "Server error. Please try again.";
        }
      });
    </script>
  </body>
</html>
